<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Interação</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <h1>Design de Interação</h1>
</header>

<nav>
    <ul>
        <li><a href="#header-intro">Apresentação</a></li>
        <li><a href="#cartao">Editor de Cartões</a></li>
        <li><a href="#">Trabalho 2</a></li>
        <li><a href="#">Trabalho 3</a></li>
    </ul>
</nav>

<main>
    <div class="center-div" id="header-intro">
        <h2>Olá mundo.</h2>
        <p>Este é o site onde ficarão todos os meus trabalhos de Design de Interação.</p>
    </div>

    <div class="div-conteudo-trabalho">
        <div id="cartao">
            <p id="textoCartao">Seu texto aqui</p>
        </div>

        <form id="editor-cartao">
            <h2 id="head-editor">Editar Cartão</h2>

            <button type="button" id="addTexto">Adicionar Novo Texto</button>

            <button type="button" id="removerTexto">Remover Texto Selecionado</button>

            <label for="selecionado">Selecionar texto (número):</label>
            <input type="number" id="selecionado" min="1" value="1">

            <label for="texto">Texto:</label>
            <input type="text" id="texto" maxlength="100">

            <label for="corTexto">Cor do texto:</label>
            <input type="color" id="corTexto">

            <label for="corBorda">Cor da borda:</label>
            <input type="color" id="corBorda">

            <label for="tamanho">Tamanho do texto:</label>
            <input type="range" id="tamanho" min="12" max="48" value="20"> <br> <br>

            <label for="selecionaImagem">Selecione uma imagem:</label>
            <input type="file" id="selecionaImagem" accept="image/*">
            
            <button type="button" id="deleteImagem">Remover Imagem</button>
        </form>
    </div>

</main>

<footer>
    <b><p>&copy; 2026 - Interface Web - Site por Rogério Freitas Mateus</p></b>
</footer>

<script src="script.js"></script>
</body>
</html>
